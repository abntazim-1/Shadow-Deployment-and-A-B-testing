version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: shadow_redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  api-gateway:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: shadow_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config
      - ../evaluations.db:/app/evaluations.db


  evaluation-worker:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: shadow_worker
    command: python -m src.evaluation.evaluator
    depends_on:
      - redis
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    volumes:
      - ../config:/app/config
      - ../evaluations.db:/app/evaluations.db



  prometheus:
    image: prom/prometheus:latest
    container_name: shadow_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: shadow_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
