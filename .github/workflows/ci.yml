name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx pytest-asyncio

      - name: Run linter (ruff)
        run: ruff check src/

      - name: Run tests
        env:
          EXPERIMENT_SALT: "ci-test-salt"
          ADMIN_API_KEY: "ci-test-key"
          PRIMARY_MODEL_NAME: "groq/llama-3.1-8b-instant"
          SHADOW_MODEL_NAME: "gemini/gemini-2.5-flash"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest tests/ -v --tb=short

  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t shadow-deployment:ci .
